name: Zenn Blog Posts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with latest Zenn articles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update English README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://zenn.dev/long910/feed"
          max_post_count: 5
          readme_path: "./README.md"

      - name: Update Japanese README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://zenn.dev/long910/feed"
          max_post_count: 5
          readme_path: "./README.ja.md"

      - name: Update Chinese README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://zenn.dev/long910/feed"
          max_post_count: 5
          readme_path: "./README.zh.md"
