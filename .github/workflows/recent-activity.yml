name: Recent Activity

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update-readmes:
    name: Update All READMEs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update English README
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "Update README with recent activity"
          MAX_LINES: 10
          TARGET_FILE: "README.md"

      - name: Sync activity section to JA and ZH READMEs
        run: |
          python3 - <<'EOF'
          import re

          MARKER_START = "<!--START_SECTION:activity-->"
          MARKER_END   = "<!--END_SECTION:activity-->"

          with open("README.md", encoding="utf-8") as f:
              src = f.read()

          m = re.search(
              re.escape(MARKER_START) + r"(.*?)" + re.escape(MARKER_END),
              src, re.DOTALL
          )
          if not m:
              raise SystemExit("Activity section not found in README.md")

          activity_block = MARKER_START + m.group(1) + MARKER_END

          for path in ["README.ja.md", "README.zh.md"]:
              with open(path, encoding="utf-8") as f:
                  content = f.read()
              updated = re.sub(
                  re.escape(MARKER_START) + r".*?" + re.escape(MARKER_END),
                  activity_block,
                  content,
                  flags=re.DOTALL
              )
              with open(path, "w", encoding="utf-8") as f:
                  f.write(updated)
              print(f"Updated {path}")
          EOF

      - name: Commit and push JA/ZH changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.ja.md README.zh.md
          git diff --cached --quiet || git commit -m "Update README.ja.md and README.zh.md with recent activity"
          git push
